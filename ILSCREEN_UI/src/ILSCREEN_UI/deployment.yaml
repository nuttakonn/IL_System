apiVersion: apps/v1
kind: Deployment
metadata:
  name: #APP_NAME#
  namespace: #NAMESPACE#
  labels:
    app: #APP_NAME#
    service: #SERVICETYPE#
    product: #PRODUCT#
spec:
  replicas: #REPLICASET#
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: #APP_NAME#
  template:
    metadata:
      labels:
        app: #APP_NAME#
    spec:
      containers:
      - name: #APP_NAME#
        image: #DOCKERURL#/#APP_NAME#:#APP_VERSION#
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: #ASPNETCORE_ENVIRONMENT#
        - name: TZ
          value: "Asia/Bangkok"
        ports:
        - containerPort: #PORT#
        readinessProbe:
          httpGet:
            path: /Home
            port: #PORT#
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          failureThreshold: 3
          timeoutSeconds: 10
        livenessProbe:
          httpGet:
            path: /Home
            port: #PORT#
          initialDelaySeconds: 900
          periodSeconds: 45
          successThreshold: 1
          failureThreshold: 3
          timeoutSeconds: 15
        resources:
          requests:
            memory: "#MEMORY#"
            cpu: "#CPU#"
          limits:
            memory: "#MEMORY#"
            cpu: "#CPU#"
      imagePullSecrets:
      - name: docker-reg-secret 
      nodeSelector:
        tier: #TIER#
---
apiVersion: v1
kind: Service
metadata: 
  name: #APP_NAME#
  namespace: #NAMESPACE#
  labels:
    app: #APP_NAME#
    service: #SERVICETYPE#
    product: #PRODUCT#
spec:
  type: NodePort
  selector:
    app: #APP_NAME#
  ports:
  - name: http
    protocol: TCP
    port: #PORT#
    targetPort: #PORT#
---